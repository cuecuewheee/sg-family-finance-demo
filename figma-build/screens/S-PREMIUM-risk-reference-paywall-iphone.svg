<svg width="393" height="852" viewBox="0 0 393 852" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <!-- Deep premium gradient: dark blue-purple -->
    <linearGradient id="prem-grad" x1="0" y1="0" x2="393" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1426"/>
      <stop offset="60%" stop-color="#1A2E5A"/>
      <stop offset="100%" stop-color="#2E1A4F"/>
    </linearGradient>
    <!-- Founding Member badge gradient -->
    <linearGradient id="badge-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#1A4F8C"/>
    </linearGradient>
    <!-- Feature highlight glow -->
    <filter id="glow" x="-20%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="card-sh" x="-5%" y="-10%" width="115%" height="135%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.12)"/>
    </filter>
  </defs>

  <!-- Screen background: near-black -->
  <rect width="393" height="852" fill="#0A0E1A"/>

  <!-- ══ PREMIUM HERO ══ -->
  <rect x="0" y="0" width="393" height="300" fill="url(#prem-grad)"/>

  <!-- Status bar -->
  <text x="20" y="24" font-size="13" font-weight="400" fill="rgba(255,255,255,0.5)">9:41</text>
  <text x="373" y="24" font-size="13" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="end">●●●</text>

  <!-- Lock icon (large, centered) -->
  <text x="196" y="90" font-size="48" text-anchor="middle">🔒</text>

  <!-- PREMIUM label -->
  <text x="196" y="130" font-size="11" font-weight="700" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="3">PREMIUM FEATURE</text>

  <!-- Title -->
  <text x="196" y="162" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle">Risk Reference</text>
  <text x="196" y="188" font-size="26" font-weight="900" fill="#FFFFFF" text-anchor="middle">Engine</text>

  <!-- Subtitle -->
  <text x="196" y="216" font-size="14" font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle">Real-time scheme eligibility projections</text>
  <text x="196" y="234" font-size="14" font-weight="400" fill="rgba(255,255,255,0.65)" text-anchor="middle">and personalised risk alerts — locked.</text>

  <!-- Price pill -->
  <rect x="143" y="248" width="107" height="32" rx="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="196" y="268" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">S$3.99 / month</text>

  <!-- ══ FEATURE CARDS ══ -->
  <!-- Feature 1 -->
  <rect x="16" y="316" width="361" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="40" y="344" font-size="28">📊</text>
  <text x="80" y="337" font-size="14" font-weight="700" fill="#FFFFFF">Subsidy projection engine</text>
  <text x="80" y="355" font-size="12" fill="rgba(255,255,255,0.6)">Model how policy changes affect your net cost</text>
  <text x="80" y="371" font-size="12" fill="rgba(255,255,255,0.5)">12-month forward forecast · updated monthly</text>

  <!-- Feature 2 -->
  <rect x="16" y="388" width="361" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="40" y="416" font-size="28">🚨</text>
  <text x="80" y="409" font-size="14" font-weight="700" fill="#FFFFFF">Real-time scheme alerts</text>
  <text x="80" y="427" font-size="12" fill="rgba(255,255,255,0.6)">Push notification when new grants open</text>
  <text x="80" y="443" font-size="12" fill="rgba(255,255,255,0.5)">Income bracket, citizenship tier, eligibility tracked</text>

  <!-- Feature 3 -->
  <rect x="16" y="460" width="361" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="40" y="488" font-size="28">🧮</text>
  <text x="80" y="481" font-size="14" font-weight="700" fill="#FFFFFF">What-if scenario builder</text>
  <text x="80" y="499" font-size="12" fill="rgba(255,255,255,0.6)">Adjust income, family size, residency tier</text>
  <text x="80" y="515" font-size="12" fill="rgba(255,255,255,0.5)">See impact on grants, CPF, tax reliefs instantly</text>

  <!-- Feature 4 -->
  <rect x="16" y="532" width="361" height="64" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="40" y="560" font-size="28">📋</text>
  <text x="80" y="553" font-size="14" font-weight="700" fill="#FFFFFF">Priority action list</text>
  <text x="80" y="571" font-size="12" fill="rgba(255,255,255,0.6)">Ranked actions by financial impact, this month</text>
  <text x="80" y="587" font-size="12" fill="rgba(255,255,255,0.5)">Never miss a deadline or renewal window</text>

  <!-- ══ SOCIAL PROOF ══ -->
  <text x="196" y="624" font-size="12" fill="rgba(255,255,255,0.45)" text-anchor="middle">Used by 2,000+ Singapore families</text>

  <!-- ══ CTA BUTTONS ══ -->
  <!-- Primary: Unlock -->
  <rect x="16" y="638" width="361" height="52" rx="14" fill="#7B5EA7"/>
  <text x="196" y="668" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Unlock Premium — S$3.99/month</text>

  <!-- Secondary: Founding Member -->
  <rect x="16" y="700" width="361" height="52" rx="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <text x="196" y="722" font-size="14" font-weight="700" fill="rgba(255,255,255,0.8)" text-anchor="middle">✦ Founding Member?</text>
  <text x="196" y="740" font-size="12" fill="rgba(255,255,255,0.5)" text-anchor="middle">Founding Members get Premium free — tap to link</text>

  <!-- ══ NAV BAR ══ -->
  <rect x="0" y="769" width="393" height="83" fill="#0F1117"/>
  <line x1="0" y1="769" x2="393" y2="769" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="49" y="799" font-size="22" text-anchor="middle">🏠</text>
  <text x="49" y="814" font-size="10" font-weight="700" fill="#2E75B6" text-anchor="middle">Home</text>
  <text x="131" y="799" font-size="22" text-anchor="middle">💰</text>
  <text x="131" y="814" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle">Costs</text>
  <text x="197" y="799" font-size="22" text-anchor="middle">🗺</text>
  <text x="197" y="814" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle">Journey</text>
  <text x="263" y="799" font-size="22" text-anchor="middle">🎁</text>
  <text x="263" y="814" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle">Grants</text>
  <text x="345" y="799" font-size="22" text-anchor="middle">⊞</text>
  <text x="345" y="814" font-size="10" font-weight="700" fill="#6B7280" text-anchor="middle">Contexts</text>

  <!-- Home indicator (lighter on dark nav) -->
  <rect x="150" y="841" width="93" height="5" rx="2.5" fill="rgba(255,255,255,0.2)"/>
</svg>
