<svg width="393" height="83" viewBox="0 0 393 83" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Nav Bar — iPhone 393px wide -->
  <!-- Background + top border -->
  <rect x="0" y="0" width="393" height="83" fill="#FFFFFF"/>
  <line x1="0" y1="0" x2="393" y2="0" stroke="#E8EAF0" stroke-width="1"/>

  <!-- Hub (active) -->
  <g id="nav-hub">
    <text x="49" y="26" font-size="22" text-anchor="middle">🏠</text>
    <text x="49" y="42" font-size="10" font-weight="700" fill="#2E75B6" text-anchor="middle">Hub</text>
  </g>

  <!-- Child -->
  <g id="nav-child">
    <text x="131" y="26" font-size="22" text-anchor="middle">👶</text>
    <text x="131" y="42" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">Child</text>
  </g>

  <!-- Plan -->
  <g id="nav-plan">
    <text x="197" y="26" font-size="22" text-anchor="middle">📋</text>
    <text x="197" y="42" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">Plan</text>
  </g>

  <!-- Care -->
  <g id="nav-care">
    <text x="263" y="26" font-size="22" text-anchor="middle">🤝</text>
    <text x="263" y="42" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">Care</text>
  </g>

  <!-- Profile -->
  <g id="nav-profile">
    <text x="345" y="26" font-size="22" text-anchor="middle">👤</text>
    <text x="345" y="42" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle">Profile</text>
  </g>

  <!-- Safe area bottom -->
  <rect x="150" y="68" width="93" height="5" rx="2.5" fill="#1A1D2E" opacity="0.2"/>
</svg>
