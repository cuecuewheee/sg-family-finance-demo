<svg width="361" height="220" viewBox="0 0 361 220" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <!-- Buttons — all 4 variants, full width (361px = 393 - 16px padding each side) -->

  <!-- PRIMARY -->
  <g id="btn-primary">
    <rect x="0" y="0" width="361" height="44" rx="12" fill="#2E75B6"/>
    <text x="180.5" y="27" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Confirm</text>
    <text x="0" y="58" font-size="9" font-weight="400" fill="#9CA3AF">PRIMARY — #2E75B6 fill, white text, 12px radius, 44px height</text>
  </g>

  <!-- SECONDARY -->
  <g id="btn-secondary" transform="translate(0,64)">
    <rect x="0" y="0" width="361" height="44" rx="12" fill="#F5F6FA" stroke="#E8EAF0" stroke-width="1"/>
    <text x="180.5" y="27" font-size="14" font-weight="600" fill="#1A1D2E" text-anchor="middle" dominant-baseline="middle">Skip</text>
    <text x="0" y="58" font-size="9" font-weight="400" fill="#9CA3AF">SECONDARY — #F5F6FA fill, #E8EAF0 border, dark text</text>
  </g>

  <!-- GHOST (in-hero) -->
  <g id="btn-ghost" transform="translate(0,128)">
    <rect x="0" y="0" width="361" height="44" rx="11" fill="rgba(255,255,255,0.15)"/>
    <!-- Show on dark bg for context -->
    <rect x="0" y="0" width="361" height="44" rx="11" fill="#1A4F8C" opacity="0.4"/>
    <text x="180.5" y="27" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle" dominant-baseline="middle">Learn more</text>
    <text x="0" y="58" font-size="9" font-weight="400" fill="#9CA3AF">GHOST — rgba(255,255,255,0.15) fill, white text — use on hero gradients only</text>
  </g>

  <!-- DESTRUCTIVE -->
  <g id="btn-destructive" transform="translate(0,192)">
    <rect x="0" y="0" width="361" height="44" rx="12" fill="#FDEAEA" stroke="rgba(217,79,79,0.3)" stroke-width="1"/>
    <text x="180.5" y="27" font-size="14" font-weight="700" fill="#D94F4F" text-anchor="middle" dominant-baseline="middle">Remove</text>
  </g>
</svg>
