<svg width="180" height="60" viewBox="0 0 180 60" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="badge-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B5EA7"/>
      <stop offset="100%" stop-color="#1A4F8C"/>
    </linearGradient>
    <filter id="badge-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="rgba(123,94,167,0.4)"/>
    </filter>
  </defs>

  <!-- Badge pill -->
  <rect x="0" y="8" width="160" height="28" rx="14" fill="url(#badge-gradient)" filter="url(#badge-glow)"/>
  <text x="80" y="26" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="0.7">✦ FOUNDING MEMBER</text>

  <!-- Annotation -->
  <text x="0" y="54" font-size="9" fill="#9CA3AF">gradient: purple #7B5EA7 → blue-dark #1A4F8C · glow: rgba(123,94,167,.4)</text>
</svg>
