<svg width="361" height="180" viewBox="0 0 361 180" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- ══ CHIPS — inline (5 variants) ══ -->
  <text x="0" y="14" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="0.9" text-transform="uppercase">CHIPS</text>

  <!-- chip-blue -->
  <rect x="0" y="20" width="60" height="22" rx="11" fill="#EBF3FA"/>
  <text x="30" y="35" font-size="11" font-weight="700" fill="#2E75B6" text-anchor="middle">Claimed</text>

  <!-- chip-green -->
  <rect x="68" y="20" width="64" height="22" rx="11" fill="#E8F6EF"/>
  <text x="100" y="35" font-size="11" font-weight="700" fill="#3A9E6F" text-anchor="middle">✓ Active</text>

  <!-- chip-amber -->
  <rect x="140" y="20" width="84" height="22" rx="11" fill="#FEF3EA"/>
  <text x="182" y="35" font-size="11" font-weight="700" fill="#ED7D31" text-anchor="middle">Action needed</text>

  <!-- chip-purple -->
  <rect x="232" y="20" width="64" height="22" rx="11" fill="#F0EAF8"/>
  <text x="264" y="35" font-size="11" font-weight="700" fill="#7B5EA7" text-anchor="middle">Pending</text>

  <!-- chip-teal -->
  <rect x="304" y="20" width="57" height="22" rx="11" fill="#E5F5F5"/>
  <text x="332.5" y="35" font-size="11" font-weight="700" fill="#1A8A8A" text-anchor="middle">Verify</text>

  <!-- ══ STATUS PILLS — 2-column grid ══ -->
  <text x="0" y="62" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="0.9">STATUS PILLS</text>

  <!-- Pill 1 -->
  <rect x="0" y="68" width="171" height="52" rx="12" fill="#FFFFFF" filter="url(#sh-card)"/>
  <defs>
    <filter id="sh-card" x="-5%" y="-5%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="rgba(0,0,0,0.07)"/>
    </filter>
  </defs>
  <text x="14" y="85" font-size="10" font-weight="700" fill="#9CA3AF" letter-spacing="0.6">EDUSAVE BALANCE</text>
  <text x="14" y="104" font-size="16" font-weight="900" fill="#1A1D2E">S$2,450</text>
  <text x="14" y="116" font-size="10" fill="#6B7280">Last updated Jun 2026</text>

  <!-- Pill 2 -->
  <rect x="179" y="68" width="171" height="52" rx="12" fill="#FFFFFF" filter="url(#sh-card)"/>
  <text x="193" y="85" font-size="10" font-weight="700" fill="#9CA3AF" letter-spacing="0.6">BABY BONUS CDA</text>
  <text x="193" y="104" font-size="16" font-weight="900" fill="#3A9E6F">S$6,000</text>
  <text x="193" y="116" font-size="10" fill="#6B7280">Matched: S$3,000</text>

  <!-- ══ SCHEME CARD STATUS CHIPS ══ -->
  <text x="0" y="142" font-size="11" font-weight="700" fill="#6B7280" letter-spacing="0.9">SCHEME CARD STATUS CHIPS</text>

  <rect x="0" y="150" width="72" height="22" rx="11" fill="#E8F6EF"/>
  <text x="36" y="165" font-size="11" font-weight="700" fill="#3A9E6F" text-anchor="middle">✓ Claimed</text>

  <rect x="80" y="150" width="88" height="22" rx="11" fill="#FEF3EA"/>
  <text x="124" y="165" font-size="11" font-weight="700" fill="#ED7D31" text-anchor="middle">Action needed</text>

  <rect x="176" y="150" width="78" height="22" rx="11" fill="#E8EAF0"/>
  <text x="215" y="165" font-size="11" font-weight="700" fill="#6B7280" text-anchor="middle">Not eligible</text>

  <rect x="262" y="150" width="48" height="22" rx="11" fill="#EBF3FA"/>
  <text x="286" y="165" font-size="11" font-weight="700" fill="#2E75B6" text-anchor="middle">Verify</text>

</svg>
